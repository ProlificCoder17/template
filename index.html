<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Template</title>
    <link
      rel="icon"
      type="image/png"
      href="https://www.google.com/s2/favicons?domain=css-tricks.com"
    />
    <link
      rel="stylesheet"
      href=" https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="quote-container" id="quote-container">
      <!-- Quote -->
      <div class="quote-text">
        <i class="fas fa-quote-left"></i>
        <span id="quote"
          >What you are is what you have been. What you will be is what you do
          now.</span
        >
      </div>
      <!-- Author -->
      <div class="quote-author">
        <span id="author">Prolificoder17</span>
      </div>
      <!-- Button -->
      <div class="button-container">
        <button class="x-button" id="x" title="Tweet This!">
            <i class="fab fa-twitter"></i>
        </button>
        <button  id="new-quote">New Quote</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
